# octo-sts trust policy for the ci-tools template sync workflow.
#
# Org-wide: applies to every wherobots repo. The sync-templates workflow in
# wherobots/ci-tools mints short-lived tokens scoped per-subscriber using
# this identity. To exclude a specific repo from sync, add an overriding
# policy at <repo>/.github/chainguard/sync-templates.sts.yaml that denies
# the same subject.
#
# Source workflow:
#   https://github.com/wherobots/ci-tools/blob/main/.github/workflows/sync-templates.yaml

# Pin the subject to ci-tools' main branch. The job_workflow_ref claim below
# additionally pins the exact workflow file, so a second workflow added to
# ci-tools/main cannot mint these tokens — ci-tools has many workflows on
# main, so this extra pin actually matters.
issuer: https://token.actions.githubusercontent.com
subject: repo:wherobots/ci-tools:ref:refs/heads/main

claim_pattern:
  job_workflow_ref: ^wherobots/ci-tools/\.github/workflows/sync-templates\.yaml@refs/heads/main$

# Smallest token surface that peter-evans/create-pull-request needs.
permissions:
  contents: write
  pull_requests: write
